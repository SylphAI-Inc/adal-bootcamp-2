<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found — Lumen Audio</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236d5efc'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='white' font-family='Arial'%3E%E2%97%97%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #0b0d12; --muted: #6b7280; --line: #e7e9ee;
        --accent: #6d5efc; --accent-dark: #5a4be0; --accent-ink: #1a1440;
        --font: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: var(--font); color: var(--ink); -webkit-font-smoothing: antialiased;
        min-height: 100vh; display: grid; place-items: center; text-align: center;
        background: radial-gradient(1000px 500px at 50% -10%, #efeaff 0%, #fff 60%); padding: 24px; }
      .wrap { max-width: 520px; }
      .brand { display: inline-flex; align-items: center; gap: 11px; font-weight: 800; font-size: 20px; letter-spacing: -0.03em; margin-bottom: 40px; }
      .brand-mark { width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
        background: linear-gradient(135deg, var(--accent), #9b8bff); color: #fff; font-size: 15px; box-shadow: 0 4px 12px rgba(109,94,252,0.4); }
      .code { font-size: clamp(80px, 16vw, 140px); font-weight: 900; line-height: 1; letter-spacing: -0.04em;
        background: linear-gradient(120deg, var(--accent), #b39bff); -webkit-background-clip: text; background-clip: text; color: transparent; }
      h1 { font-size: clamp(24px, 4vw, 32px); font-weight: 800; margin: 12px 0 14px; letter-spacing: -0.02em; }
      p { color: var(--muted); font-size: 17px; margin: 0 auto 32px; max-width: 30em; line-height: 1.6; }
      .cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      .btn { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: 0; border-radius: 999px;
        padding: 13px 24px; font: inherit; font-weight: 600; font-size: 15px; text-decoration: none;
        transition: transform .15s ease, box-shadow .15s ease, background .15s ease; }
      .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 6px 20px rgba(109,94,252,0.35); }
      .btn-primary:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: 0 10px 28px rgba(109,94,252,0.45); }
      .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
      .btn-ghost:hover { border-color: var(--ink); }
      :focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a class="brand" href="/"><span class="brand-mark">◗</span> Lumen Audio</a>
      <div class="code">404</div>
      <h1>This page went quiet.</h1>
      <p>The page you're looking for doesn't exist or has moved. Let's get you back to the music.</p>
      <div class="cta">
        <a href="/" class="btn btn-primary">← Back to home</a>
        <a href="/#products" class="btn btn-ghost">Shop the collection</a>
      </div>
    </div>
  </body>
</html>
