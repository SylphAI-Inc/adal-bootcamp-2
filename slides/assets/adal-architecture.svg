<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="engineerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF5898"/>
      <stop offset="100%" stop-color="#FF8AB5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- User -->
  <rect x="370" y="20" width="160" height="50" rx="25" fill="#FF5898"/>
  <text x="450" y="50" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="700">You</text>
  <text x="450" y="68" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" opacity="0.8">"describe what you want"</text>

  <!-- Arrow down -->
  <line x1="450" y1="75" x2="450" y2="110" stroke="#FF5898" stroke-width="2"/>
  <polygon points="450,115 445,105 455,105" fill="#FF5898"/>

  <!-- Engineer Mode (big box hiding complexity) -->
  <rect x="150" y="120" width="600" height="160" rx="16" fill="url(#engineerBg)" stroke="#FF5898" stroke-width="2"/>
  <text x="450" y="150" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="20" font-weight="800">AdaL Engineer Mode</text>
  <text x="450" y="172" text-anchor="middle" fill="#888" font-family="system-ui" font-size="13">hides all the complexity</text>

  <!-- Hidden complexity items (crossed out / faded) -->
  <rect x="185" y="190" width="150" height="32" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="260" y="210" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12" text-decoration="line-through">/agent selection</text>

  <rect x="355" y="190" width="150" height="32" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="430" y="210" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12" text-decoration="line-through">/model routing</text>

  <rect x="525" y="190" width="150" height="32" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="600" y="210" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12" text-decoration="line-through">harness setup</text>

  <rect x="185" y="232" width="150" height="32" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="260" y="252" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12" text-decoration="line-through">contract negotiation</text>

  <rect x="355" y="232" width="150" height="32" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="430" y="252" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12" text-decoration="line-through">context windows</text>

  <rect x="525" y="232" width="150" height="32" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="600" y="252" text-anchor="middle" fill="#555" font-family="system-ui" font-size="12" text-decoration="line-through">loop wiring</text>

  <!-- Arrows down to workers -->
  <line x1="260" y1="290" x2="260" y2="320" stroke="#FF5898" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="450" y1="290" x2="450" y2="320" stroke="#FF5898" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="640" y1="290" x2="640" y2="320" stroke="#FF5898" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Workers -->
  <!-- Deep Research -->
  <rect x="130" y="325" width="190" height="80" rx="12" fill="#0d0d0d" stroke="#FF5898" stroke-width="1.5"/>
  <circle cx="155" cy="350" r="12" fill="none" stroke="#FF5898" stroke-width="2"/>
  <line x1="155" y1="338" x2="155" y2="362" stroke="#FF5898" stroke-width="2"/>
  <line x1="149" y1="344" x2="161" y2="344" stroke="#FF5898" stroke-width="1"/>
  <line x1="149" y1="356" x2="161" y2="356" stroke="#FF5898" stroke-width="1"/>
  <text x="175" y="354" fill="#fff" font-family="system-ui" font-size="15" font-weight="700">Deep Research</text>
  <text x="175" y="372" fill="#888" font-family="system-ui" font-size="11">reads docs, analyzes</text>
  <text x="175" y="386" fill="#888" font-family="system-ui" font-size="11">competitors, gathers</text>

  <!-- Coding -->
  <rect x="355" y="325" width="190" height="80" rx="12" fill="#0d0d0d" stroke="#FF5898" stroke-width="1.5"/>
  <text x="375" y="355" fill="#FF5898" font-family="monospace" font-size="22" font-weight="700">&lt;/&gt;</text>
  <text x="415" y="354" fill="#fff" font-family="system-ui" font-size="15" font-weight="700">Coding</text>
  <text x="415" y="372" fill="#888" font-family="system-ui" font-size="11">implements, tests,</text>
  <text x="415" y="386" fill="#888" font-family="system-ui" font-size="11">surgical edits</text>

  <!-- Browser Use -->
  <rect x="580" y="325" width="190" height="80" rx="12" fill="#0d0d0d" stroke="#FF5898" stroke-width="1.5"/>
  <rect x="600" y="342" width="28" height="20" rx="3" fill="none" stroke="#FF5898" stroke-width="2"/>
  <line x1="600" y1="349" x2="628" y2="349" stroke="#FF5898" stroke-width="1"/>
  <circle cx="605" cy="346" r="1.5" fill="#FF5898"/>
  <text x="640" y="354" fill="#fff" font-family="system-ui" font-size="15" font-weight="700">Browser Use</text>
  <text x="640" y="372" fill="#888" font-family="system-ui" font-size="11">designs, builds,</text>
  <text x="640" y="386" fill="#888" font-family="system-ui" font-size="11">debugs UIs</text>

  <!-- Evaluator (feedback loop) -->
  <rect x="355" y="435" width="190" height="60" rx="12" fill="none" stroke="#FF5898" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="450" y="460" text-anchor="middle" fill="#FF5898" font-family="system-ui" font-size="14" font-weight="700">✓ Evaluator</text>
  <text x="450" y="478" text-anchor="middle" fill="#888" font-family="system-ui" font-size="11">verifies against contract</text>

  <!-- Feedback arrow (evaluator back up to engineer mode) -->
  <path d="M 545 465 Q 750 465 750 200 Q 750 180 760 180" fill="none" stroke="#FF5898" stroke-width="1.5" stroke-dasharray="4 4"/>
  <polygon points="760,175 750,170 752,182" fill="#FF5898"/>
  <text x="700" y="340" fill="#FF5898" font-family="system-ui" font-size="10" opacity="0.7">feedback loop</text>

  <!-- Arrows from workers to evaluator -->
  <line x1="260" y1="405" x2="400" y2="435" stroke="#FF5898" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="450" y1="405" x2="450" y2="435" stroke="#FF5898" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <line x1="640" y1="405" x2="500" y2="435" stroke="#FF5898" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>

  <!-- Output arrow -->
  <line x1="450" y1="495" x2="450" y2="510" stroke="#FF5898" stroke-width="2"/>
  <polygon points="450,515 445,508 455,508" fill="#FF5898"/>
  <text x="450" y="510" text-anchor="middle" fill="#888" font-family="system-ui" font-size="10" opacity="0">result</text>
</svg>